name: Build rules

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python3 scripts/build.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Build generated rule files
