name: Update ShieldNova Dataset

on:
  schedule:
    - cron: "0 2 * * 1"    # Weekly: every Monday 02:00 UTC (build only)
    - cron: "0 3 1 * *"    # Monthly: 1st of month 03:00 UTC (threat intel fetch + build)
  workflow_dispatch:
    inputs:
      run_fetch:
        description: "Run threat intelligence fetch (yes/no)"
        required: false
        default: "no"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Threat intel fetch - run monthly or on manual trigger
      # Weekly build: fetch is skipped, continue-on-error not needed
      # Monthly / manual fetch: failure creates a GitHub Issue via notify-failure job
      - name: Run unit tests
        run: |
          echo "[+] Running unit tests for shared helpers..."
          python3 scripts/test_common.py
          python3 scripts/test_version_consistency.py

      - name: Fetch threat intelligence
        if: |
          github.event.schedule == '0 3 1 * *' ||
          github.event.inputs.run_fetch == 'yes'
        run: |
          echo "[+] Fetching threat intelligence from public feeds..."
          python3 scripts/fetch_threat_intel.py

      - name: Audit existing rules (post-fetch)
        if: |
          github.event.schedule == '0 3 1 * *' ||
          github.event.inputs.run_fetch == 'yes'
        run: |
          echo "[+] Auditing src/security/ for feed pollution..."
          python3 scripts/audit_existing_rules.py --fix --output dist/audit_report.json
          echo "Audit complete"

      - name: Build rule artifacts
        run: python3 scripts/build.py

      - name: False positive gate
        run: |
          echo "[+] Running false positive detection..."
          python3 scripts/test_false_positives.py

      - name: Generate release report
        run: |
          echo "[+] Generating transparency report..."
          python3 scripts/generate_release_report.py

      - name: Show stats
        run: |
          echo "=== Build Stats ==="
          [ -f dist/stats.json ] && cat dist/stats.json || echo "stats.json missing"
          echo ""
          echo "=== Fetch Stats ==="
          [ -f dist/fetch_stats.json ] && cat dist/fetch_stats.json || echo "No fetch stats (fetch not run)"
          echo ""
          echo "=== Rule Counts ==="
          for f in dist/shieldnova-*.txt; do
            count=$(grep -cv '^[!#]' "$f" 2>/dev/null | head -1)
            echo "  $(basename $f): $count rules"
          done

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Directory-level adds so new output files (e.g. additional
          # format outputs, future config tables) are picked up
          # automatically instead of being silently dropped.
          git add src/ dist/ formats/ config/ CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changes detected. Skipping commit."
          else
            TOTAL=$(python3 scripts/commit_message.py 2>/dev/null || echo "auto-update")
            git commit -m "chore: shieldnova $(date -u +%Y-%m-%d) | ${TOTAL}"
            git push
          fi

  notify-failure:
    runs-on: ubuntu-latest
    needs: update
    if: ${{ needs.update.result == 'failure' }}
    permissions:
      issues: write

    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `ShieldNova update failed — ${new Date().toISOString().split('T')[0]}`;
            const body = [
              '## ShieldNova automated update failed',
              '',
              `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Possible causes:',
              '- Threat intel feed unavailable or returned invalid data',
              '- Build script validation failure',
              '- Git push conflict',
              '',
              'Please investigate the workflow logs and re-run manually if needed.',
            ].join('\n');

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure',
              per_page: 5,
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['ci-failure'],
              });
            }
